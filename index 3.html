<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Happy Valentine 🌹 楓へ</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #ffb6c1, #ff69b4);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", sans-serif;
}

.card {
  background: #fff;
  padding: 28px;
  border-radius: 22px;
  width: 320px;
  text-align: center;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

h1 {
  color: #ff4d6d;
  font-size: 22px;
  margin-bottom: 10px;
}

p {
  font-size: 15px;
  color: #444;
  line-height: 1.7;
}

.music-btn {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 18px;
  background: #ff4d6d;
  color: #fff;
  text-decoration: none;
  border-radius: 25px;
  font-size: 14px;
}

.note {
  font-size: 12px;
  color: #777;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">
  <h1>💖 Happy Valentine 💖</h1>

  <p>
    島本楓へ 🌸<br><br>
    楓と過ごす時間は、<br>
    いつも自然で、あたたかくて、<br>
    気づいたら大切な存在になっていました。<br><br>
    これからも、<br>
    そばにいさせてくれたら嬉しいです。
  </p>

  <!-- Nút mở nhạc -->
  <a class="music-btn"
     href="https://www.youtube.com/watch?v=FJZ-BHBKyos"
     target="_blank">
     🌹 ROSE – HANA を聴く
  </a>

  <p class="note">
    ※タップするとYouTubeが開いて音楽が流れます
  </p>
</div>

</body>
</html>
